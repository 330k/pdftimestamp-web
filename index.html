<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
    <meta property="og:title" content="Online PDF Timestamper: pdftimestamp-web">
    <meta property="og:description" content="This web application applies LTV-compliant timestamp signatures to the selected PDF file.">
    <meta property="og:image" content="https://330k.github.io/pdftimestamp-web/header.webp">
    <meta property="og:url" content="https://330k.github.io/pdftimestamp-web/">
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23grad)'/%3E%3Cpath d='M25 30 L25 70 L55 70 L55 45 L40 30 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M40 30 L40 45 L55 45' fill='white' opacity='0.6'/%3E%3Ccircle cx='70' cy='65' r='18' fill='white' opacity='0.95'/%3E%3Cpath d='M70 53 L70 65 L78 60' stroke='%23667eea' stroke-width='3' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">

    <title>PDF Timestamp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .cheerpj-loading {
            color: #666;
            text-aglin: center;
            font-size: 14px;
            width: 100%;
        }

        .cheerpj-loading progress{
            width: 100%;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f2ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 14px;
        }

        .password-section {
            margin-top: 20px;
            display: none;
        }

        .password-section.show {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: #f8f9ff;
        }

        .form-input::placeholder {
            color: #999;
        }

        .password-hint {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
            display: flex;
            align-items: center;
        }

        .password-hint::before {
            content: "ℹ️";
            margin-right: 5px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            color: #666;
            transition: color 0.3s;
        }

        .password-toggle-btn:hover {
            color: #667eea;
        }
        .footer {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDFタイムスタンプ</h1>
        <p class="subtitle">PDFファイルにタイムスタンプを付与します</p>
        <div class="cheerpj-loading" id="cheerpjLoading">
            Loading... <progress id="cheerpjProgress" value="0"></progress>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📎</div>
            <div class="upload-text">クリックまたはドラッグ&ドロップ</div>
            <div class="upload-hint">PDFファイルのみ対応（最大50MB）</div>
        </div>

        <input type="file" id="fileInput" accept=".pdf,application/pdf">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="password-section" id="passwordSection">
            <div class="form-group">
                <label class="form-label" for="pdfPassword">
                    🔒 PDFパスワード（任意）
                </label>
                <div class="password-toggle">
                    <input 
                        type="password" 
                        id="pdfPassword" 
                        class="form-input" 
                        placeholder="パスワード保護されている場合は入力してください"
                        autocomplete="off"
                    >
                    <button type="button" class="password-toggle-btn" id="togglePassword">
                        👁️
                    </button>
                </div>
                <div class="password-hint">
                    PDFが暗号化されている場合のみ入力してください
                </div>
            </div>
        </div>

        <button class="btn btn-primary" id="uploadBtn" disabled>
            タイムスタンプを付与してダウンロード
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>処理中...</div>
        </div>

        <div class="message" id="message"></div>
        <div class="footer">
            <a href="https://github.com/330k/pdftimestamp-web">GitHub</a>, Powered by: <a href="https://cheerpj.com/" target="_blank">CheerpJ</a>, <a href="https://github.com/akr/pdftimestamp" target="_blank">pdftimestamp</a>
        </div>
    </div>

    <script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const passwordSection = document.getElementById('passwordSection');
const pdfPassword = document.getElementById('pdfPassword');
const togglePassword = document.getElementById('togglePassword');
const uploadBtn = document.getElementById('uploadBtn');
const loading = document.getElementById('loading');
const message = document.getElementById('message');
const cheerpjLoading = document.getElementById('cheerpjLoading');
const cheerpjProgress = document.getElementById('cheerpjProgress');

let selectedFile = null;

cheerpjInit({
    version: 17,
    javaProperties: ['pdftimestamp.urlprefix=https%3A%2F%2Fgeneric-proxy.330k.workers.dev%2F%3Fx-url%3D'],
    preloadProgress: showPreloadProgress,
    preloadResources: {"/lt/17/lib/modules":[0,131072,1179648,5373952,5505024,6291456,6422528,6553600,6684672,7208960,7733248,8519680,9175040,9306112,9437184,10092544,10354688,10485760,19005440,19136512,19791872,19922944,21364736,21626880,21757952,22020096,25165824,25296896,26083328,26476544,26738688,27000832,27787264,27918336,28704768,28835840,29622272,29753344,30015488,30146560,30670848,30801920,35520512,35913728,37486592,37617664,37748736,37879808,38010880,38141952],"/lt/etc/users":[0,131072],"/lt/17/jre/lib/cheerpj-handlers.jar":[0,131072],"/lt/17/jre/lib/cheerpj-awt.jar":[0,131072],"/lt/17/jre/lib/cheerpj-jsobject.jar":[0,131072],"/lt/17/conf/security/java.security":[0,131072],"/lt/17/conf/logging.properties":[0,131072],"/lt/17/lib/tzdb.dat":[0,131072],"/lt/etc/localtime":[],"/lt/17/conf/accessibility.properties":[],"/lt/etc/timezone":[]}
});

// パスワード表示/非表示切り替え
togglePassword.addEventListener('click', () => {
    const type = pdfPassword.type === 'password' ? 'text' : 'password';
    pdfPassword.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
});

// クリックでファイル選択
uploadArea.addEventListener('click', () => {
    fileInput.click();
});

// ファイル選択時
fileInput.addEventListener('change', (e) => {
    handleFile(e.target.files[0]);
});

// ドラッグ&ドロップ
uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
});

function showPreloadProgress(preloadDone, preloadTotal) {
    console.log({preloadDone, preloadTotal});
    cheerpjProgress.max = preloadTotal
    cheerpjProgress.value = preloadDone;
    if(preloadDone >= preloadTotal){
        cheerpjLoading.style.display = 'none';
    }
}

function handleFile(file) {
    if (!file) return;

    if (file.type !== 'application/pdf') {
        showMessage('PDFファイルを選択してください', 'error');
        return;
    }

    if (file.size > 50 * 1024 * 1024) {
        showMessage('ファイルサイズは50MB以下にしてください', 'error');
        return;
    }

    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatFileSize(file.size);
    fileInfo.classList.add('show');
    passwordSection.classList.add('show');
    uploadBtn.disabled = false;
    hideMessage();
}

function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    loading.classList.add('show');
    hideMessage();

    try {
        const pdfBytes = new Uint8Array(await selectedFile.arrayBuffer());
        await cheerpOSAddStringFile("/str/input.pdf", pdfBytes);

        const outputfile = "/files/" + crypto.randomUUID() + ".pdf";
        const password = pdfPassword.value.trim();
        const args = [
            "/app" + (new URL('./', location.href)).pathname + "pdftimestamp-all.jar",
            ...(password ? ["-p", password] : []),
            "http://ts.ssl.com",
            "/str/input.pdf",
            outputfile
        ];console.log(args);

        await cheerpjRunJar(...args);

        const blob = new Blob([await cjFileBlob(outputfile)], { type: "application/octet-stream" });
        if(blob.size <= 5){
            throw new Error("");
        }
        downloadFile(blob, selectedFile.name.replace('.pdf', '_timestamped.pdf'));

        showMessage('タイムスタンプ付きPDFのダウンロードが完了しました', 'success');

        // リセット
        setTimeout(() => {
            resetForm();
        }, 2000);

    } catch (error) {
        showMessage('エラーが発生しました: ' + error.message, 'error');
        uploadBtn.disabled = false;
    } finally {
        loading.classList.remove('show');
    }
});

function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message show ' + type;
}

function hideMessage() {
    message.classList.remove('show');
}

function resetForm() {
    selectedFile = null;
    fileInput.value = '';
    pdfPassword.value = '';
    pdfPassword.type = 'password';
    togglePassword.textContent = '👁️';
    fileInfo.classList.remove('show');
    passwordSection.classList.remove('show');
    uploadBtn.disabled = true;
    hideMessage();
}

// Download file
function downloadFile(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
    </script>
</body>
</html>
